    body {
      font-family: Arial, sans-serif;
      background: #f4f6fb;
      padding: 40px;
      text-align: center;
    }

    .box {
      background: white;
      max-width: 500px;
      margin: auto;
      padding: 32px;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.15);
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 20px;
      background: #667eea;
      color: white;
      border-radius: 12px;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>📤 Gửi tài liệu</h1>
    <p>
      Vui lòng gửi tài liệu qua Google Form bên dưới.
      Tài liệu sẽ được kiểm duyệt trước khi chia sẻ.
    </p>

    <!-- ĐỔI LINK GOOGLE FORM CỦA BẠN -->
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSeFr8eYBnnZ3nfd7fNo_7oi6lgDYPjJ3irpUxEzQHfdSsswWg/viewform?usp=publish-editor" target="_blank">

    </a>

</html>
