<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Giới thiệu</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  min-height:100vh;
  background:#eef1f7;
  font-family:system-ui, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
}
.card{
  max-width:390px;
  width:100%;
  background:#fff;
  border-radius:28px;
  padding:26px;
  box-shadow:0 25px 50px rgba(0,0,0,.15);
  text-align:center;
}
h1{
  font-size:22px;
  margin-bottom:14px;
}
p{
  font-size:14px;
  color:#555;
  line-height:1.7;
  margin-bottom:20px;
}
a{
  display:inline-block;
  text-decoration:none;
  background:#4f46e5;
  color:#fff;
  padding:12px 18px;
  border-radius:14px;
  font-weight:600;
}
a:hover{
  opacity:.9;
}
</style>
</head>

<body>
<div class="card">
  <h1>👨‍⚕️ Giới thiệu</h1>
  <p>
    Gia đình bác sĩ là không gian chia sẻ tài liệu học tập,
    kiến thức lâm sàng và kinh nghiệm chuyên môn dành cho
    sinh viên y khoa và nhân viên y tế.
  </p>
  <a href="index.html">⬅ Quay về trang chính</a>
</div>
</body>
</html>
