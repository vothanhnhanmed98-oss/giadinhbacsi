<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Giới thiệu</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .card {
      background: #fff;
      width: 100%;
      max-width: 380px;
      padding: 28px 22px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    h1 {
      font-size: 22px;
      margin-bottom: 12px;
      color: #222;
    }

    p {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    a {
      display: inline-block;
      text-decoration: none;
      background: #667eea;
      color: white;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 500;
    }

    a:hover {
      background: #5563d6;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>👨‍⚕️ Giới thiệu</h1>
    <p>
      Gia đình bác sĩ là nơi chia sẻ tài liệu học tập,
      kinh nghiệm lâm sàng và kiến thức y khoa
      dành cho sinh viên và nhân viên y tế.
    </p>

    <a href="index.html">⬅ Quay về trang chính</a>
  </div>
</body>
</html>
