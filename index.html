<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Gia đình bác sĩ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
:root{
  --bg:#eef1f7;
  --card:#ffffff;
  --text:#1f2937;
  --sub:#6b7280;
  --pri:#4f46e5;
  --btn:#f3f4f6;
}
body.dark{
  --bg:#0f172a;
  --card:#111827;
  --text:#e5e7eb;
  --sub:#9ca3af;
  --pri:#818cf8;
  --btn:#1f2937;
}
body{
  margin:0;
  min-height:100vh;
  background:var(--bg);
  font-family:system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px;
  transition:.3s;
}
.card{
  width:100%;
  max-width:390px;
  background:var(--card);
  border-radius:28px;
  padding:26px 22px;
  box-shadow:0 25px 50px rgba(0,0,0,.15);
  color:var(--text);
}
.menu{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px;
}
.menu a{
  text-decoration:none;
  color:var(--pri);
  font-weight:600;
}
.toggle{
  cursor:pointer;
}
.avatar{
  width:112px;
  height:112px;
  border-radius:50%;
  object-fit:cover;
  margin:18px auto 12px;
  display:block;
  border:4px solid var(--pri);
}
h1{
  text-align:center;
  font-size:22px;
  margin:6px 0;
}
.desc{
  text-align:center;
  font-size:14px;
  color:var(--sub);
  margin-bottom:16px;
}
.notice{
  background:var(--btn);
  padding:12px;
  border-radius:14px;
  font-size:14px;
  text-align:center;
  margin-bottom:18px;
}
.qr{
  text-align:center;
  margin-bottom:16px;
}
.qr img{
  width:150px;
  border-radius:14px;
}
.actions button{
  width:100%;
  border:none;
  background:var(--btn);
  padding:12px;
  border-radius:14px;
  margin-bottom:10px;
  font-weight:600;
  cursor:pointer;
}
.actions button:hover{
  background:var(--pri);
  color:#fff;
}
.links a{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  text-decoration:none;
  background:var(--btn);
  padding:14px;
  border-radius:16px;
  margin-bottom:12px;
  color:var(--text);
  font-weight:600;
  transition:.2s;
}
.links a:hover{
  background:var(--pri);
  color:#fff;
  transform:translateY(-2px);
}
footer{
  text-align:center;
  font-size:12px;
  color:var(--sub);
  margin-top:14px;
}
</style>
</head>

<body>
<div class="card">

  <div class="menu">
    <a href="index.html">🏠 Home</a>
    <a href="gioithieu.html">👨‍⚕️ Giới thiệu</a>
    <a href="tailieu.html">📚 Tài liệu</a>
    <div class="toggle" onclick="toggleDark()">🌙</div>
  </div>

  <img src="avatar.jpg" class="avatar">

  <h1>Thành Nhân – Thúy Vi</h1>
  <div class="desc">Gia đình bác sĩ · Chia sẻ tài liệu & học tập</div>

  <div class="notice">
    📢 Cập nhật tài liệu học tập mới
  </div>

  <div class="qr">
    <p>📱 Quét QR truy cập nhanh</p>
    <img src="qr.png">
  </div>

  <div class="actions">
    <button onclick="copyLink()">📋 Copy link website</button>
    <button onclick="downloadQR()">⬇️ Tải QR code</button>
  </div>

  <div class="links">
    <a href="tailieu.html"><i class="fa-solid fa-book"></i> Xem tài liệu</a>
    <a href="https://www.facebook.com/vo.thanh.nhan.623473/" target="_blank">
      <i class="fa-brands fa-facebook"></i> Liên hệ Facebook
    </a>
  </div>

  <footer>© 2026 Gia đình bác sĩ</footer>
</div>

<script>
function toggleDark(){
  document.body.classList.toggle("dark");
  localStorage.setItem("dark",document.body.classList.contains("dark"));
}
if(localStorage.getItem("dark")==="true"){
  document.body.classList.add("dark");
}
function copyLink(){
  navigator.clipboard.writeText(window.location.href);
  alert("Đã copy link website!");
}
function downloadQR(){
  const a=document.createElement("a");
  a.href="qr.png";
  a.download="QR-GiaDinhBacSi.png";
  a.click();
}
</script>
</body>
</html>
