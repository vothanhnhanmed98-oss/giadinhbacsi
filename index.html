<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Gia đình bác sĩ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <!-- Google Analytics (để trống ID nếu chưa dùng) -->
  <!--
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXX');
  </script>
  -->

  <style>
    :root {
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #222;
      --sub: #666;
      --btn: #f1f3f5;
      --primary: #667eea;
    }

    body.dark {
      --bg: #121212;
      --card: #1e1e1e;
      --text: #ffffff;
      --sub: #bbbbbb;
      --btn: #2a2a2a;
      --primary: #8f9bff;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
      transition: 0.3s;
    }

    .card {
      background: var(--card);
      max-width: 380px;
      width: 100%;
      padding: 28px 22px;
      border-radius: 22px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      color: var(--text);
    }

    .toggle {
      text-align: right;
      font-size: 14px;
      cursor: pointer;
      color: var(--primary);
    }

    img.avatar {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      object-fit: cover;
      margin: 16px 0;
      border: 4px solid var(--primary);
    }

    h1 {
      margin: 6px 0;
      font-size: 22px;
    }

    .desc {
      color: var(--sub);
      font-size: 14px;
      margin-bottom: 14px;
    }

    .notice {
      background: var(--btn);
      padding: 10px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 18px;
    }

    .qr img {
      width: 150px;
      border-radius: 12px;
      margin: 10px 0 20px;
    }

    .links a {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
      background: var(--btn);
      color: var(--text);
      text-decoration: none;
      padding: 14px;
      border-radius: 14px;
      margin-bottom: 12px;
      transition: 0.25s;
    }

    .links a:hover {
      background: var(--primary);
      color: #fff;
      transform: translateY(-3px);
    }

    footer {
      margin-top: 14px;
      font-size: 12px;
      color: var(--sub);
    }
  </style>
</head>

<body>
  <div class="card">
    <div class="toggle" onclick="toggleDark()">🌙 Dark mode</div>

    <img src="avatar.jpg" class="avatar" alt="avatar">

    <h1>Thành Nhân – Thúy Vi</h1>
    <div class="desc">Gia đình bác sĩ · Chia sẻ tài liệu & học tập</div>

    <!-- Thông báo -->
    <div class="notice">
      📢 Cập nhật tài liệu mới ngày 25/02
    </div>

    <!-- QR -->
    <div class="qr">
      <p>📱 Quét QR để truy cập nhanh</p>
      <img src="qr.png" alt="QR code">
    </div>

    <!-- Link -->
    <div class="links">
      <a href="gioithieu.html"><i class="fa-solid fa-user"></i> Giới thiệu</a>
      <a href="tailieu.html"><i class="fa-solid fa-book"></i> Tài liệu</a>
      <a href="https://www.facebook.com/vo.thanh.nhan.623473/" target="_blank">
        <i class="fa-brands fa-facebook"></i> Liên hệ Facebook
      </a>
    </div>

    <footer>© 2026 Gia đình bác sĩ</footer>
  </div>

  <script>
    function toggleDark() {
      document.body.classList.toggle("dark");
    }
  </script>
</body>
</html>
