<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Gia đình bác sĩ</title>

  <!-- Hiển thị đẹp khi share link -->
  <meta name="description" content="Gia đình bác sĩ – chia sẻ tài liệu, học tập và thông tin hữu ích." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Icon -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }

    .profile {
      background: #fff;
      width: 100%;
      max-width: 380px;
      padding: 32px 24px;
      border-radius: 24px;
      text-align: center;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
      animation: fadeIn 0.8s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .profile img.avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 16px;
      border: 4px solid #667eea;
    }

    h1 {
      margin: 8px 0 6px;
      font-size: 22px;
      color: #222;
    }

    .desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    /* QR */
    .qr-box {
      margin-bottom: 24px;
    }

    .qr-box p {
      font-size: 14px;
      color: #555;
      margin-bottom: 10px;
    }

    .qr-box img {
      width: 160px;
      border-radius: 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }

    /* Link buttons */
    .links a {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 14px;
      background: #f1f3f5;
      color: #333;
      font-weight: 500;
      transition: all 0.25s ease;
    }

    .links a:hover {
      background: #667eea;
      color: #fff;
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    footer {
      margin-top: 18px;
      font-size: 12px;
      color: #999;
    }
  </style>
</head>

<body>
  <div class="profile">

    <!-- Avatar -->
    <img src="avatar.jpg" alt="Ảnh đại diện" class="avatar">

    <!-- Tên + mô tả -->
    <h1>Thành Nhân – Thúy Vi</h1>
    <div class="desc">
      Gia đình bác sĩ · Chia sẻ tài liệu & học tập
    </div>

    <!-- QR -->
    <div class="qr-box">
      <p>📱 Quét QR để truy cập nhanh</p>
      <img src="qr.png" alt="QR code website">
    </div>

    <!-- Link -->
    <div class="links">
      <a href="https://padlet.com/vothanhnhanmed98/h-nh-th-c-sr8fb4rzh4edxl1m" target="_blank">
        <i class="fa-solid fa-folder-open"></i>
        128 Vấn Đề Lâm Sàng
      </a>

      <a href="https://drive.google.com/drive/folders/1-F19fUmIWaMUzJAB0ceVc45fywtyo0bS" target="_blank">
        <i class="fa-brands fa-google-drive"></i>
        Drive hình ảnh
      </a>

      <a href="https://drive.google.com/drive/folders/1U7HdGPexuVDBuJv9YUn_5GSrns-8kd_x" target="_blank">
        <i class="fa-solid fa-book"></i>
        Tài liệu ĐH – SDH
      </a>

      <a href="https://www.facebook.com/vo.thanh.nhan.623473/" target="_blank">
        <i class="fa-brands fa-facebook"></i>
        Liên hệ Facebook
      </a>
    </div>

    <footer>
      © 2026 Gia đình bác sĩ
    </footer>

  </div>
</body>
</html>
